name: Deploy to GitHub Pages

# Builds the static Mic Drop SPA and publishes it to GitHub Pages.
# No signing, no server — it's a plain static bundle. File save/open uses the
# browser File System Access API, which needs the HTTPS that Pages provides
# (Chrome/Edge desktop only).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:data   # regenerate events.ts + copy guides from guides/*.md
      - run: bun run build        # tsc + vite -> dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
